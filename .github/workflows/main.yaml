name: production

# main 브랜치: PR=웹 빌드 검증 / push(머지)=운영 AAB 빌드 → 아티팩트 보관
# (Play 프로덕션 자동 업로드는 중단: 첫 출시 전이라 precondition 미충족 + develop 비공개(alpha) 배포와 Play Edit 충돌.
#  첫 프로덕션 출시는 아티팩트 AAB로 Play Console에서 수동 진행. 정식 출시 후 자동 업로드 복구 가능.)
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # PR·push 공통: 웹 정적 빌드 검증 (운영 env)
  build-web:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Write .env (production)
        env:
          ENV_CONTENT: ${{ secrets.ENV_PRODUCTION }}
        run: printf '%s' "$ENV_CONTENT" > .env

      - name: Build web (nuxt generate)
        run: npm run generate

  # 머지(push) 시에만: 서명된 운영 AAB 빌드 → Play 프로덕션 트랙 업로드(초안=수동 출시)
  build-app:
    needs: build-web
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Play 서비스계정 시크릿 유무를 step if에서 판별하기 위해 env로 노출
      PLAY_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # versionCode(커밋 수) 계산용 전체 히스토리

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Install deps
        run: npm ci

      - name: Write .env (production)
        env:
          ENV_CONTENT: ${{ secrets.ENV_PRODUCTION }}
        run: printf '%s' "$ENV_CONTENT" > .env

      - name: Build web + sync to native
        run: npm run cap:sync

      - name: Decode keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_B64" | base64 -d > android/didit-upload.keystore

      - name: Write keystore.properties
        env:
          KS_PASS: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          cat > android/keystore.properties << EOF
          storeFile=${{ github.workspace }}/android/didit-upload.keystore
          storePassword=$KS_PASS
          keyAlias=didit
          keyPassword=$KS_PASS
          EOF

      - name: Build signed AAB
        run: |
          export ANDROID_VERSION_CODE=$(git rev-list --count HEAD)
          echo "versionCode=$ANDROID_VERSION_CODE"
          cd android
          ./gradlew bundleRelease --no-daemon

      # 프로덕션 자동 업로드는 중단(첫 출시 전 precondition 미충족 + develop 비공개 배포와 Play Edit 충돌).
      # 대신 운영(production env) AAB를 아티팩트로 보관 → 첫 프로덕션 출시는 이 파일로 Play Console에서 수동 진행.
      # 정식 출시 후 자동 업로드를 되살리려면 아래 r0adkll 스텝을 복구 (track: production, status: draft).
      - name: Upload AAB artifact (production)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab-production
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
